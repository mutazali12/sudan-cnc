<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNC Sudan | استوديو تصميم لافتات LED Neon</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- opentype.js لتحميل الخطوط -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/opentype.js/1.3.4/opentype.min.js"></script>
    <!-- Three.js import map -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.156.1/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.156.1/examples/jsm/"
            }
        }
    </script>
    <!-- CSS مخصص -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="p-3 md:p-6 lg:p-8">

<div class="max-w-7xl mx-auto">
    <!-- الرأس -->
    <header class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 pb-6 border-b border-slate-700/60 mb-6">
        <h1 class="text-2xl md:text-3xl font-bold text-white">
            <span class="text-cyan-400">CNC Sudan</span>
            <span class="text-sm font-normal text-slate-400 block md:inline md:mr-3">| استوديو تصميم لافتات <span class="text-cyan-400">LED Neon</span></span>
        </h1>
        <button id="btn-download-dxf" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-lg text-sm md:text-base transition-all hover:shadow-emerald-500/25">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
            تحميل DXF
        </button>
    </header>

    <!-- الشبكة الرئيسية -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 lg:gap-8">
        <!-- لوحة التحكم -->
        <div class="lg:col-span-1 glass-panel p-5 md:p-6 rounded-2xl shadow-2xl space-y-4 border border-white/10 self-start">
            <h2 class="text-lg font-semibold text-cyan-300 mb-3 flex items-center gap-2"><span>⚙️</span> إعدادات التصميم</h2>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">📁 رفع خط مخصص (TTF / OTF)</label>
                <input type="file" id="font-upload" accept=".ttf,.otf" class="w-full text-sm file:mr-3 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-cyan-900 file:text-cyan-300 hover:file:bg-cyan-800 cursor-pointer">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">✏️ النص المطلوب</label>
                <textarea id="text-input" rows="2" class="w-full p-3 rounded-lg border border-slate-600 bg-slate-700 text-white resize-none text-right text-lg font-semibold focus:ring-2 focus:ring-cyan-500 placeholder-slate-400" placeholder="اكتب النص هنا...">معزز</textarea>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">📐 عرض اللوحة (سم)</label>
                    <input type="number" id="width-cm" value="100" min="10" max="500" class="w-full p-2.5 rounded-lg border border-slate-600 bg-slate-700 text-white text-center focus:ring-2 focus:ring-cyan-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">📏 ارتفاع اللوحة (سم)</label>
                    <input type="number" id="height-cm" value="60" min="10" max="500" class="w-full p-2.5 rounded-lg border border-slate-600 bg-slate-700 text-white text-center focus:ring-2 focus:ring-cyan-500">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">🔘 قطر الثقب (مم)</label>
                    <input type="number" id="hole-radius" value="3" step="0.1" min="0.5" max="20" class="w-full p-2.5 rounded-lg border border-slate-600 bg-slate-700 text-white text-center focus:ring-2 focus:ring-cyan-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">📊 التباعد (مم)</label>
                    <input type="number" id="hole-spacing" value="15" step="1" min="3" max="100" class="w-full p-2.5 rounded-lg border border-slate-600 bg-slate-700 text-white text-center focus:ring-2 focus:ring-cyan-500">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">↔️ المسافة عن الحافة (مم)</label>
                <input type="number" id="edge-offset" value="4" step="0.5" min="0.5" max="30" class="w-full p-2.5 rounded-lg border border-slate-600 bg-slate-700 text-white text-center focus:ring-2 focus:ring-cyan-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-300 mb-1">🎨 لون الـ LED</label>
                <input type="color" id="led-color" value="#00ffff" class="w-full h-10 rounded-lg cursor-pointer border-0 p-1 bg-slate-700">
            </div>

            <!-- شريط التقدم -->
            <div id="progress-container" class="pt-2 space-y-1 hidden">
                <div class="flex justify-between text-xs text-slate-400">
                    <span id="progress-label">جاري المعالجة...</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                <p id="progress-detail" class="text-xs text-slate-500"></p>
            </div>

            <div id="status-message" class="text-xs text-slate-400 text-center py-1"></div>

            <button id="btn-process" class="w-full bg-cyan-600 hover:bg-cyan-700 text-white py-3 rounded-xl font-bold transition text-base shadow-lg hover:shadow-cyan-500/25">
                🔄 تحديث المعاينة
            </button>

            <div class="text-xs text-slate-500 text-center pt-2">
                الثقوب: <span id="hole-count">-</span> | الوقت: <span id="proc-time">-</span>
            </div>
        </div>

        <!-- منطقة المعاينة -->
        <div class="lg:col-span-2 space-y-6">
            <!-- Canvas 2D -->
            <div class="bg-slate-800/80 p-4 rounded-2xl border border-slate-700/60 shadow-xl">
                <h3 class="text-sm font-medium text-slate-400 mb-3 text-center">📋 معاينة التوزيع + إطار القطع (Canvas 2D)</h3>
                <div class="flex justify-center bg-white/95 p-2 rounded-xl overflow-auto min-h-[280px] max-h-[500px]" id="canvas-wrapper">
                    <canvas id="main-canvas"></canvas>
                </div>
            </div>

            <!-- Three.js 3D -->
            <div class="bg-slate-800/80 p-4 rounded-2xl border border-slate-700/60 shadow-xl relative">
                <h3 class="text-sm font-medium text-slate-400 mb-3 text-center">🖥️ المعاينة الواقعية (Three.js 3D)</h3>
                <div id="three-container">
                    <div id="loader-3d" class="absolute inset-0 flex items-center justify-center text-white text-lg bg-black/70 z-10 pulse-anim" style="display:flex;">جاري تحميل المحرك...</div>
                </div>
                <p class="text-xs text-slate-500 text-center mt-2">🖱️ اسحب للتدوير | 🔍 عجلة الفأرة للتكبير</p>
                <div class="text-center mt-1">
                    <a href="https://mutaz.net" target="_blank" class="text-slate-500 hover:text-cyan-400 text-xs transition">Developed by Mutaz</a>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ملفات الجافاسكريبت -->
<script type="module" src="js/main.js"></script>
</body>
</html>
