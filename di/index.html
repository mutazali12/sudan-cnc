<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>استعراض التصميم الهندسي</title>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <style>
        body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; background: #1a1a1a; }
        #svg-container { flex-grow: 1; width: 100%; cursor: grab; }
        .toolbar { padding: 10px; background: #333; color: white; display: flex; justify-content: center; gap: 15px; }
        button { padding: 8px 16px; cursor: pointer; border: none; border-radius: 4px; background: #555; color: white; }
        button:hover { background: #777; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button onclick="instance.zoomIn()">تكبير (+)</button>
        <button onclick="instance.zoomOut()">تصغير (-)</button>
        <button onclick="instance.reset()">الوضع الأصلي</button>
        <button onclick="instance.fit()">احتواء الشاشة</button>
    </div>

    <div id="svg-container">
        <object id="my-svg" data="designs/1.svg" type="image/svg+xml" width="100%" height="100%"></object>
    </div>

    <script>
        var instance;
        window.onload = function() {
            var svgElement = document.getElementById('my-svg');
            svgElement.addEventListener('load', function() {
                instance = svgPanZoom('#my-svg', {
                    zoomEnabled: true,
                    controlIconsEnabled: false, // تم الإخفاء لنترك الواجهة نظيفة
                    fit: true,
                    center: true,
                    minZoom: 0.5,
                    maxZoom: 10,
                    // تفعيل التحريك الحر
                    panEnabled: true,
                    dblClickZoomEnabled: true
                });
            });
        };
    </script>
</body>
</html>
