<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>معرض التصاميم - عرض تفاعلي</title>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background: #f4f4f4; }
        #container { width: 100%; height: 80vh; border: 2px solid #333; background: white; overflow: hidden; }
        .controls { margin-top: 10px; text-align: center; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>استعراض التصميم: 1.svg</h1>
    
    <div id="container">
        <object id="svg-view" data="1.svg" type="image/svg+xml" style="width:100%; height:100%;"></object>
    </div>

    <div class="controls">
        <button onclick="panZoomInstance.zoomIn()">تكبير (+)</button>
        <button onclick="panZoomInstance.zoomOut()">تصغير (-)</button>
        <button onclick="panZoomInstance.reset()">إعادة تعيين</button>
        <a href="1.cdr" download>تحميل ملف CDR</a>
    </div>

    <script>
        // تفعيل التفاعل بعد تحميل ملف الـ SVG
        window.onload = function() {
            var svgElement = document.getElementById('svg-view');
            
            // انتظر حتى يتم تحميل الـ SVG بالكامل
            svgElement.addEventListener('load', function() {
                window.panZoomInstance = svgPanZoom('#svg-view', {
                    zoomEnabled: true,
                    controlIconsEnabled: true,
                    fit: true,
                    center: true
                });
            });
        };
    </script>
</body>
</html>
